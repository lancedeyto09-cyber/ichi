name: ichi
description: ICHI - music learning app
publish_to: "none"
version: 0.0.1

environment:
  sdk: ">=2.18.0 <4.0.0"

dependencies:
  cloud_firestore: ^6.2.0
  firebase_auth: ^6.3.0
  firebase_core: ^4.6.0
  flutter:
    sdk: flutter
  google_fonts: ^6.3.0
  http: ^1.6.0
  image_picker: ^1.2.1
  provider: ^6.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true

  # foreground (logo or icon pare)
  adaptive_icon_foreground: "assets/images/logoo.png"

  # background 'to yah
  adaptive_icon_background: "#8E6BE8" 

flutter:
  uses-material-design: true

  assets:
    - assets/images/logoo.png